; Dungeon Defenders Redux — Toolkit settings
; Edit values here instead of touching the scripts in src/.
;
; Note on default hotkeys: none of them use F1-F12 (or higher F-keys) on
; purpose. Some players reserve that whole row for a separate tool that
; switches focus between several simultaneous game clients/characters —
; a toolkit default shouldn't compete for that space. Feel free to bind
; F-keys yourself if you don't need them for anything else.

[Game]
; Process name of the game window. Every script scopes its hotkeys to this
; process so nothing leaks into chat, Discord, or your browser.
ProcessName=DunDefGame.exe

[AutoAbility]
; Set to false to turn this macro off entirely (no hotkeys registered at
; all) without deleting its settings — toggleable from DDToolkit's tray
; menu/settings window too.
Enabled=true
; Key sent on each tick (game keybind for the ability/trap you want refreshed).
Key=e
; Cooldown in milliseconds between presses.
IntervalMs=47000
; Press to arm/disarm the loop.
ToggleKey=ScrollLock
; Emergency stop — always kills the timer, even if the toggle state got out of sync.
PanicKey=Pause

[TowerStacking]
; Set to false to turn this macro off entirely.
Enabled=true
; Modifier + number row used to trigger a stack (matches the community-standard
; DunDefGame.exe tower hotkeys: 1-0). Only change this if your in-game keybinds differ.
Modifier=Ctrl

[AutoClicker]
; Set to false to turn this macro off entirely.
Enabled=true
; Milliseconds between synthetic clicks while a button is held (the
; reference scripts this replaces were named "10 CPS" but actually ran at
; 20ms = ~50 clicks/sec — pick the real number you want here).
IntervalMs=20
; Arms/disarms left-click turbo-fire. Left and right can use the same key
; if you want both to arm together, like the two separate reference
; scripts effectively did.
LeftToggleKey=CapsLock
RightToggleKey=Insert
; true = only turbo-fires while Dungeon Defenders is the focused window.
; false = system-wide, matching the original scripts' behavior exactly.
ScopeToGame=true

[AbilityWheelColors]
; Hex colors (RRGGBB) the Jester's Wheel of Fortune slots can show. Tweak
; these if slot detection misses on your monitor (gamma/HDR calibration
; can shift the sampled color slightly) — see ToleranceRGB below too.
EternityCrystal=0x05DDFF
Goblin=0x242800
Sword=0x72C1E2
Potion=0xB90000
ManaToken=0x060030

[AbilityWheel]
; Set to false to turn this macro off entirely.
Enabled=true
; Hotbar slot that opens the Wheel of Fortune.
WheelHotbarSlot=3
; PixelSearch color-variation tolerance (0 = exact match only).
ToleranceRGB=2
; Press in-game if a spin isn't detecting correctly: opens the wheel and
; reports the actual color found in each of the 3 slots (matches an
; existing name below or not), instead of a silent "no match". See
; README.md's AbilityWheel section.
DiagnosticKey=^!d

; Each Spin.<Name> = Color1,Color2,Color3,Hotkey (colors reference the
; names in [AbilityWheelColors] above). Add or remove lines freely — no
; code edits needed. These 5 are the reference repo's original active
; bindings (its own inline comments had Ctrl+E and Ctrl+F swapped versus
; the keys they were actually bound to; the names below match the real
; keys).
Spin.DamageAllEnemies=Sword,Sword,Sword,^e
Spin.KillPortionOfEnemies=Sword,Sword,EternityCrystal,^f
Spin.HealAllAllies=Potion,Potion,Potion,^h
Spin.DebuffEnemies=Goblin,Goblin,EternityCrystal,^d
Spin.BuffPlayers=EternityCrystal,EternityCrystal,EternityCrystal,^b

; More combos from the same source, disabled by default (uncomment and
; pick a free hotkey to enable):
;Spin.GoldenEnemies=Goblin,Goblin,Goblin,^g
;Spin.BuffEnemies=Goblin,EternityCrystal,EternityCrystal,^u
;Spin.DowngradeNearbyTower=Goblin,ManaToken,ManaToken,^y
;Spin.PlayersUnableToRepair=Sword,ManaToken,ManaToken,^r
;Spin.StunEnemies=Goblin,Goblin,Potion,^n
;Spin.SlowMotion=Potion,Potion,ManaToken,^m
;Spin.UpgradeNearestTower=ManaToken,ManaToken,ManaToken,^t

[ChargeShot]
; Set to false to turn this macro off entirely.
Enabled=true
; Holds AttackButton down for ChargeMs then releases it automatically —
; one consistent charge instead of timing a hold by feel. The DD wiki
; cites ~70% charge as a good benchmark for Apprentice staves; tune
; ChargeMs to whatever duration gets you there with your current weapon's
; charge speed (it varies per item, so there's no universal number).
TriggerKey=^Space
ChargeMs=500
AttackButton=LButton

[GameTweaks]
; Filled in automatically the first time you use "Corriger les textures"
; (DDToolkit settings window or GameTweaks.ahk) — leave blank, you'll be
; asked to pick your Dungeon Defenders install folder once.
InstallPath=
