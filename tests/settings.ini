; Fixture ini for tests/*.test.ahk — never touched by the real app.
; DD.ConfigPath resolves same-folder-first (see src/Lib/Common.ahk), and
; tests/RunTests.ahk lives right next to this file, so DD.Read* calls in
; the test suites read from here instead of config/settings.ini.

[TestBool]
TrueLower=true
TrueUpper=True
TrueOne=1
TrueSpaced= true
FalseLower=false
FalseZero=0

[TestSection]
KeyOne=ValueOne
KeyTwo=ValueTwo

[TestInt]
Valid=42
NotNumeric=abc

; Real Init() fixtures below. Hotkey()/HotIfWinActive() are shimmed (see
; tests/Shims.ahk) so none of these ever register a real hotkey with
; Windows — the key names below are arbitrary placeholders, not a
; suggestion for real bindings, and deliberately avoid the F-row (some
; players reserve it for a separate multi-client window-switcher tool).

[AutoAbility]
Enabled=true
Key=q
IntervalMs=5000
ToggleKey=NumpadEnter
PanicKey=NumpadAdd

[TowerStacking]
Enabled=true
Modifier=Alt

[ChargeShot]
Enabled=true
TriggerKey=NumpadSub
ChargeMs=300
AttackButton=RButton

[AutoClicker]
Enabled=true
IntervalMs=10
LeftToggleKey=NumpadMult
RightToggleKey=NumpadDiv
ScopeToGame=true

[AbilityWheelColors]
TestColor1=0x111111
TestColor2=0x222222
TestColor3=0x333333

[AbilityWheel]
Enabled=true
WheelHotbarSlot=3
ToleranceRGB=2
DiagnosticKey=NumpadMult
Spin.TestSpin=TestColor1,TestColor2,TestColor3,NumpadDot
Spin.BadSpinUnknownColor=TestColor1,TestColor2,NotAColor,NumpadClear
Spin.BadSpinWrongFieldCount=TestColor1,TestColor2,NumpadIns

[GameTweaks]
InstallPath=
